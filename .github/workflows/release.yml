name: Release assets

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to rebuild, upload, and attest"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release assets
        run: npm run build

      - name: Lint source
        run: npm run lint

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$DISPATCH_TAG"
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" main.js manifest.json styles.css --clobber
          else
            gh release create "$tag" main.js manifest.json styles.css --title "$tag" --notes "Release $tag" --verify-tag
          fi
